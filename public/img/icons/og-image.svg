<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BD68F"/>
      <stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative wave arcs (right side, fading) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="14" opacity="0.18">
    <path d="M 1200 480 a 120 120 0 0 0 -120 -120"/>
    <path d="M 1200 480 a 240 240 0 0 0 -240 -240"/>
    <path d="M 1200 480 a 360 360 0 0 0 -360 -360"/>
    <path d="M 1200 480 a 480 480 0 0 0 -480 -480"/>
  </g>

  <!-- Icon block (left side, RTL → "first" position is right but title is the
       primary content; we put the icon on the left as visual balance). -->
  <g transform="translate(110 165)">
    <rect width="300" height="300" rx="60" fill="rgba(255,255,255,0.12)"/>
    <g transform="translate(40 40)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="22">
      <path d="M 50 175 a 45 45 0 0 1 45 -45"/>
      <path d="M 50 175 a 90 90 0 0 1 90 -90"/>
      <path d="M 50 175 a 135 135 0 0 1 135 -135"/>
    </g>
    <circle cx="150" cy="215" r="20" fill="#ffffff"/>
  </g>

  <!-- Hebrew title — right-aligned because Hebrew is RTL -->
  <text x="1090" y="290" text-anchor="end" font-family="Rubik, system-ui, sans-serif" font-size="82" font-weight="700" fill="#ffffff" direction="rtl">רדיו ישראלי</text>
  <text x="1090" y="370" text-anchor="end" font-family="Rubik, system-ui, sans-serif" font-size="38" font-weight="400" fill="rgba(255,255,255,0.9)" direction="rtl">כל התחנות החיות במקום אחד</text>
  <text x="1090" y="440" text-anchor="end" font-family="Rubik, system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)" direction="rtl">iradio.vercel.app</text>
</svg>
